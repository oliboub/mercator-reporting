server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → backend FastAPI
    location /api/ {
        proxy_pass http://mercator-reporting:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Timeouts étendus pour Ollama sur CPU (peut prendre plusieurs minutes)
        proxy_read_timeout    2700s;   # 45 min — doit correspondre à OLLAMA_TIMEOUT
        proxy_connect_timeout 10s;
        proxy_send_timeout    2700s;

        # Désactiver le buffering pour les réponses longues
        proxy_buffering off;
    }

    location /health {
        proxy_pass http://mercator-reporting:8000;
    }

    # SPA fallback — toutes les autres routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}